<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Playlist</title>
    <style>
        body { font-family: Arial, sans-serif; background:#0f0f0f; color:#fff; margin:0; padding:0; }
        .container { padding: 15px; max-width: 100%; }
        .player { position:relative; padding-top:56.25%; background:#000; margin:15px 0; border-radius:8px; overflow:hidden; }
        .player iframe { position:absolute; top:0; left:0; width:100%; height:100%; }
        form { display:flex; gap:8px; margin:15px 0; }
        input[type=text] { flex:1; padding:14px; border:none; border-radius:6px; background:#333; color:white; font-size:16px; }
        button { padding:12px 18px; background:#ff0000; color:white; border:none; border-radius:6px; cursor:pointer; font-size:15px; }
        
        .list li { background:#1f1f1f; margin:8px 0; padding:12px; border-radius:8px; display:flex; align-items:center; gap:10px; }
        .list a { flex:1; color:#fff; text-decoration:none; font-size:15px; }
        .delete { 
            color:#ff4444; background:#333; width:28px; height:28px; 
            display:flex; align-items:center; justify-content:center; 
            border-radius:50%; font-size:18px; flex-shrink:0;
        }
        .backup-btn { background:#0066cc; margin:5px; }
        .success, .error { padding:10px; border-radius:6px; margin:10px 0; }
        .success { background:#004d00; }
        .error { background:#660000; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align:center;">🎵 YouTube Playlist</h1>
    
    <div id="message"></div>

    <div id="player" class="player" style="display:none;">
        <iframe id="ytplayer" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
    </div>

    <form id="addForm">
        <input type="text" id="urlInput" placeholder="Dán link YouTube..." required>
        <button type="submit">➕ Thêm</button>
    </form>

    <div style="margin:10px 0;">
        <button class="backup-btn" onclick="exportPlaylist()">📤 Xuất dsbaihat.txt</button>
        <button class="backup-btn" onclick="document.getElementById('importFile').click()">📥 Nhập file</button>
        <input type="file" id="importFile" accept=".txt" style="display:none;" onchange="importPlaylist(event)">
    </div>

    <h3>Danh sách bài hát (<span id="count">0</span>)</h3>
    <ul id="playlist" class="list"></ul>

    <p style="text-align:center; color:#888; margin-top:20px; font-size:14px;">
        💡 Safari → aA → Request Desktop Website
    </p>
</div>

<script>
let playlist = JSON.parse(localStorage.getItem('youtubePlaylist')) || [];

function getVideoId(url) {
    const regex = /(?:v=|youtu\.be\/|embed\/)([^&\n?#]+)/;
    const match = url.match(regex);
    return match ? match[1] : null;
}

function renderPlaylist() {
    const ul = document.getElementById('playlist');
    const count = document.getElementById('count');
    ul.innerHTML = '';
    count.textContent = playlist.length;

    playlist.forEach((item, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
            <a href="#" onclick="playVideo(${index}); return false;">${item.title}</a>
            <a href="#" class="delete" onclick="deleteVideo(${index}); return false;">✕</a>
        `;
        ul.appendChild(li);
    });
}

async function getVideoTitle(url) {
    const id = getVideoId(url);
    if (!id) return "YouTube Video";
    try {
        const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
        if (res.ok) {
            const data = await res.json();
            return data.title;
        }
    } catch(e){}
    return "YouTube Video";
}

// Thêm bài
document.getElementById('addForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    let url = document.getElementById('urlInput').value.trim();
    const id = getVideoId(url);
    if (!id) return showMessage('❌ Link không hợp lệ', 'error');

    url = `https://www.youtube.com/watch?v=${id}`;
    const title = await getVideoTitle(url);

    playlist.push({url, title, id});
    localStorage.setItem('youtubePlaylist', JSON.stringify(playlist));
    showMessage('✅ Đã thêm!', 'success');
    document.getElementById('urlInput').value = '';
    renderPlaylist();
});

function showMessage(text, type) {
    const div = document.getElementById('message');
    div.innerHTML = `<p class="${type}">${text}</p>`;
    setTimeout(() => div.innerHTML = '', 3000);
}

function deleteVideo(index) {
    if (confirm('Xóa bài này?')) {
        playlist.splice(index, 1);
        localStorage.setItem('youtubePlaylist', JSON.stringify(playlist));
        renderPlaylist();
    }
}

function playVideo(index) {
    const vid = playlist[index];
    document.getElementById('player').style.display = 'block';
    document.getElementById('ytplayer').src = `https://www.youtube.com/embed/${vid.id}?autoplay=1&rel=0`;
}

// Export thành dsbaihat.txt
function exportPlaylist() {
    if (playlist.length === 0) {
        showMessage('Danh sách trống!', 'error');
        return;
    }
    const content = playlist.map(item => item.url).join('\n');
    const blob = new Blob([content], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'dsbaihat.txt';
    a.click();
    showMessage('✅ Đã tải file dsbaihat.txt', 'success');
}

// Import file dsbaihat.txt
async function importPlaylist(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const text = await file.text();
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    
    for (const url of lines) {
        const id = getVideoId(url);
        if (id && !playlist.some(item => item.id === id)) {
            const title = await getVideoTitle(url);
            playlist.push({url: `https://www.youtube.com/watch?v=${id}`, title, id});
        }
    }
    
    localStorage.setItem('youtubePlaylist', JSON.stringify(playlist));
    renderPlaylist();
    showMessage('✅ Đã nhập danh sách từ file!', 'success');
}

renderPlaylist();
</script>
</body>
</html>
