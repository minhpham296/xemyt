<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Playlist - GitHub Pages</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background:#0f0f0f; 
            color:#fff; 
            margin:0; 
            padding:0; 
        }
        .container { 
            padding: 15px; 
            max-width: 100%; 
        }
        .player { 
            position:relative; 
            padding-top:56.25%; 
            background:#000; 
            margin:15px 0; 
            border-radius:8px; 
            overflow:hidden; 
        }
        .player iframe { 
            position:absolute; 
            top:0; left:0; 
            width:100%; 
            height:100%; 
        }
        form { 
            display:flex; 
            gap:8px; 
            margin:15px 0; 
        }
        input[type=text] { 
            flex:1; 
            padding:14px; 
            border:none; 
            border-radius:6px; 
            background:#333; 
            color:white; 
            font-size:16px; 
        }
        button { 
            padding:14px 20px; 
            background:#ff0000; 
            color:white; 
            border:none; 
            border-radius:6px; 
            cursor:pointer; 
        }
        
        .list li { 
            background:#1f1f1f; 
            margin:8px 0; 
            padding:12px; 
            border-radius:8px; 
            display:flex; 
            align-items:center; 
            gap:10px;
        }
        .list a { 
            flex:1; 
            color:#fff; 
            text-decoration:none; 
            font-size:15px;
        }
        
        /* Nút xóa nhỏ gọn hơn */
        .delete { 
            color:#ff4444; 
            background:#333; 
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            text-decoration:none;
            flex-shrink: 0;
        }
        
        .success { background:#004d00; padding:10px; border-radius:6px; margin:10px 0; }
        .error { background:#660000; padding:10px; border-radius:6px; margin:10px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align:center;">🎵 YouTube Playlist</h1>
    
    <div id="message"></div>

    <!-- Player -->
    <div id="player" class="player" style="display:none;">
        <iframe id="ytplayer" frameborder="0" allowfullscreen allow="autoplay"></iframe>
    </div>

    <!-- Form thêm -->
    <form id="addForm">
        <input type="text" id="urlInput" placeholder="Dán link YouTube vào đây..." required>
        <button type="submit">➕ Thêm</button>
    </form>

    <h3>Danh sách bài hát (<span id="count">0</span>)</h3>
    <ul id="playlist" class="list"></ul>

    <p style="text-align:center; color:#888; margin-top:30px; font-size:14px;">
        💡 Dùng Safari trên iPhone → Nhấn <b>aA</b> → Request Desktop Website để chơi nền tốt hơn
    </p>
</div>

<script>
// Lưu danh sách vào localStorage
let playlist = JSON.parse(localStorage.getItem('youtubePlaylist')) || [];

// Render danh sách
function renderPlaylist() {
    const ul = document.getElementById('playlist');
    const count = document.getElementById('count');
    ul.innerHTML = '';
    count.textContent = playlist.length;

    playlist.forEach((item, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
            <a href="#" onclick="playVideo(${index}); return false;">
                ${item.title}
            </a>
            <a href="#" class="delete" onclick="deleteVideo(${index}); return false;">Xóa</a>
        `;
        ul.appendChild(li);
    });
}

// Lấy tiêu đề video
async function getVideoTitle(url) {
    try {
        const videoId = url.match(/(?:v=|youtu\.be\/|embed\/)([^&\n?#]+)/)?.[1];
        if (!videoId) return "YouTube Video";
        
        const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
        const data = await response.json();
        return data.title || "YouTube Video";
    } catch (e) {
        return "YouTube Video";
    }
}

// Thêm bài hát
document.getElementById('addForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const urlInput = document.getElementById('urlInput');
    let url = urlInput.value.trim();

    if (!url) return;

    // Chuẩn hóa link
    if (url.includes('youtu.be')) {
        const id = url.split('youtu.be/')[1].split('?')[0];
        url = `https://www.youtube.com/watch?v=${id}`;
    }

    const title = await getVideoTitle(url);
    
    playlist.push({ url: url, title: title });
    localStorage.setItem('youtubePlaylist', JSON.stringify(playlist));
    
    document.getElementById('message').innerHTML = '<p class="success">✅ Đã thêm bài hát!</p>';
    urlInput.value = '';
    renderPlaylist();
    
    setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
});

// Xóa bài
function deleteVideo(index) {
    if (confirm('Xóa bài hát này?')) {
        playlist.splice(index, 1);
        localStorage.setItem('youtubePlaylist', JSON.stringify(playlist));
        renderPlaylist();
    }
}

// Chơi video
function playVideo(index) {
    const video = playlist[index];
    const videoId = video.url.match(/(?:v=|youtu\.be\/)([^&\n?#]+)/)?.[1];
    
    if (videoId) {
        document.getElementById('player').style.display = 'block';
        document.getElementById('ytplayer').src = 
            `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0`;
    }
}

// Khởi động
renderPlaylist();
</script>
</body>
</html>
